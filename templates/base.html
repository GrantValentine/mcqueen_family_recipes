<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page_title }}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cream: '#fdf6ec',
            sage:  '#6b7f5e',
          },
          fontFamily: {
            serif: ['Georgia', 'Cambria', 'serif'],
          }
        }
      }
    }
  </script>
  <style>
    body { background-color: #fdf6ec; }
    .recipe-card:hover { transform: translateY(-2px); transition: transform 0.15s ease; }
    @media print {
      nav, #search-bar, .no-print { display: none !important; }
      .print-break { page-break-before: always; }
    }
  </style>
</head>
<body class="font-serif text-stone-800 min-h-screen flex flex-col">

  <!-- Nav -->
  <nav class="bg-sage text-white shadow-md no-print">
    <div class="max-w-5xl mx-auto px-4 py-3 flex flex-col sm:flex-row items-center gap-3">
      <a href="{{ root_path }}" class="text-xl font-bold tracking-wide hover:text-amber-200 transition-colors">
        Julie's Recipes
      </a>
      <div class="flex gap-4 text-sm flex-wrap justify-center sm:ml-4">
        <a href="{{ root_path }}" class="hover:text-amber-200 transition-colors">Home</a>
        <a href="{{ root_path }}appetizers/" class="hover:text-amber-200 transition-colors">Appetizers</a>
        <a href="{{ root_path }}bread/" class="hover:text-amber-200 transition-colors">Bread</a>
        <a href="{{ root_path }}cookies/" class="hover:text-amber-200 transition-colors">Cookies</a>
        <a href="{{ root_path }}desserts/" class="hover:text-amber-200 transition-colors">Desserts</a>
        <a href="{{ root_path }}main-dishes/" class="hover:text-amber-200 transition-colors">Mains</a>
        <a href="{{ root_path }}salads/" class="hover:text-amber-200 transition-colors">Salads</a>
        <a href="{{ root_path }}vegetables-and-side-dishes/" class="hover:text-amber-200 transition-colors">Sides</a>
      </div>
      <div class="sm:ml-auto w-full sm:w-64" id="search-bar">
        <input
          id="search-input"
          type="search"
          placeholder="Search recipes…"
          class="w-full px-3 py-1.5 rounded text-stone-800 text-sm focus:outline-none focus:ring-2 focus:ring-amber-300"
          autocomplete="off"
        >
        <ul id="search-results" class="hidden absolute bg-white shadow-lg rounded mt-1 z-50 text-stone-800 text-sm max-h-64 overflow-y-auto w-64"></ul>
      </div>
    </div>
  </nav>

  <!-- Page content -->
  <main class="flex-1 max-w-5xl mx-auto w-full px-4 py-8">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="text-center text-stone-500 text-xs py-6 border-t border-stone-200 no-print">
    Julie's Christmas 2025 Recipes &mdash; a family cookbook with love
  </footer>

  <!-- Fuse.js search -->
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7/dist/fuse.min.js"></script>
  <script src="{{ root_path }}static/search.js"></script>
</body>
</html>
