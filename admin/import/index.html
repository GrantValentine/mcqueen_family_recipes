<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Import Recipe — JoLene's Family Recipes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&family=Spectral:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&display=swap" rel="stylesheet">
  <style>
    :root { --paper:#f4eee1; --paper-dark:#e8dfc8; --card-bg:#fffdf8;
            --garden-ink:#3a4630; --sage:#8f9c7c; --terracotta:#9a4f35; --ink:#2a2820; }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Spectral',Georgia,serif; background:var(--paper); color:var(--ink); min-height:100vh; }

    /* ── Top bar ── */
    .top-bar {
      background:var(--paper); color:var(--garden-ink); padding:0 1.5rem;
      display:flex; align-items:center; justify-content:space-between;
      height:52px; position:sticky; top:0; z-index:100;
      border-bottom:2px solid var(--terracotta);
    }
    .top-bar__left { display:flex; align-items:center; gap:.9rem; }
    .back-link { color:rgba(58,70,48,.55); font-size:.8rem; text-decoration:none; }
    .back-link:hover { color:var(--garden-ink); }
    .top-bar__title { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:1rem; }
    .btn--ghost { font-family:'Spectral',serif; font-size:.8rem; padding:.38rem .9rem; border-radius:6px;
      border:1.5px solid rgba(58,70,48,.3); background:transparent; color:var(--garden-ink); cursor:pointer; }
    .btn--ghost:hover { opacity:.8; }

    /* ── Banner ── */
    .admin-banner { display:none; padding:.65rem 1.2rem; font-size:.83rem; border-radius:6px; margin:1rem 1.5rem 0; }
    .admin-banner--error   { background:#fef2f2; border:1px solid #fca5a5; color:#b91c1c; }
    .admin-banner--success { background:#f0fdf4; border:1px solid #86efac; color:#166534; }

    /* ── Page ── */
    .page { max-width:560px; margin:3rem auto; padding:0 1.5rem 4rem; }
    .page__heading { font-family:'Cormorant Garamond',serif; font-style:italic;
      font-size:1.6rem; color:var(--garden-ink); margin-bottom:.4rem; }
    .page__sub { color:var(--sage); font-size:.9rem; margin-bottom:2rem; }

    /* Ensure the HTML hidden attribute is never overridden by display rules */
    [hidden] { display: none !important; }

    /* ── Drop zone ── */
    .drop-zone {
      display:block; /* keep as block so <p> children don't escape */
      border:2px dashed rgba(58,70,48,.3); border-radius:12px;
      background:var(--card-bg); padding:2.8rem 2rem; text-align:center;
      transition:border-color .15s, background .15s; cursor:pointer;
    }
    .drop-zone.drag-over { border-color:var(--garden-ink); background:var(--paper-dark); }
    .drop-zone__icon { font-size:2.4rem; margin-bottom:.8rem; }
    .drop-zone__text { display:block; color:var(--sage); font-size:.88rem; margin-bottom:.6rem; }
    .drop-zone__hint { display:block; font-size:.78rem; color:#aaa; margin-top:.4rem; }

    .pick-label {
      display:inline-block; font-family:'Cormorant Garamond',serif; font-style:italic;
      font-size:.88rem;
      background:var(--garden-ink); color:var(--paper); padding:.42rem 1.1rem;
      border-radius:6px; cursor:pointer; transition:opacity .15s;
    }
    .pick-label:hover { opacity:.85; }

    /* ── File info chips ── */
    .file-chip-list { display:flex; flex-direction:column; gap:.5rem; margin-top:1.2rem; }
    .file-chip {
      display:flex; align-items:center; gap:.6rem;
      background:var(--paper-dark); border-radius:8px; padding:.55rem .9rem;
    }
    .file-chip__name { font-size:.85rem; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .file-chip__rm { background:none; border:none; font-size:1rem; color:var(--sage);
      cursor:pointer; line-height:1; padding:.1rem .3rem; border-radius:4px; }
    .file-chip__rm:hover { color:#b91c1c; }

    /* ── Import button ── */
    .import-btn {
      display:block; width:100%; margin-top:1.4rem;
      font-family:'Spectral',serif;
      font-size:1rem; font-weight:500; padding:.72rem;
      background:var(--garden-ink); color:var(--paper); border:none; border-radius:8px;
      cursor:pointer; transition:opacity .15s;
    }
    .import-btn:hover:not(:disabled) { opacity:.88; }
    .import-btn:disabled { opacity:.4; cursor:default; }

    /* ── Loading state ── */
    .loading-box {
      text-align:center; padding:3rem 1rem;
    }
    .spinner {
      width:40px; height:40px; border:3px solid var(--paper-dark);
      border-top-color:var(--garden-ink); border-radius:50%;
      animation:spin .8s linear infinite; margin:0 auto 1.2rem;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
    .loading-box p { color:var(--sage); font-size:.92rem; }
    .loading-box strong { display:block; font-family:'Cormorant Garamond',serif; font-style:italic;
      font-size:1.1rem;
      color:var(--garden-ink); margin-bottom:.4rem; }
  </style>
</head>
<body>

<div class="top-bar">
  <div class="top-bar__left">
    <a class="back-link" href="/admin/">← Dashboard</a>
    <span class="top-bar__title">Import Recipe</span>
  </div>
  <button class="btn--ghost" onclick="logout()">Log out</button>
</div>

<div id="admin-banner" class="admin-banner"></div>

<div class="page">
  <h1 class="page__heading">Import a Recipe</h1>
  <p class="page__sub">Upload a PDF, Word document, or photos and Claude will extract the recipe for you to review before saving. Select multiple photos if the recipe spans several pages.</p>

  <!-- Drop zone (shown by default) -->
  <div id="main-ui">
    <label class="drop-zone" id="drop-zone" for="file-input">
      <span class="drop-zone__icon">📄</span>
      <span class="drop-zone__text">Drag &amp; drop files here, or</span>
      <span class="pick-label">Choose files</span>
      <span class="drop-zone__hint">PDF · Word (.docx) · JPEG / PNG / WebP &nbsp;—&nbsp; multiple photos OK · large photos compressed automatically</span>
    </label>
    <input type="file" id="file-input" hidden multiple
           accept=".pdf,.docx,.doc,.jpg,.jpeg,.png,.webp,.txt,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document,image/jpeg,image/png,image/webp,text/plain">

    <div class="file-chip-list" id="file-chip-list"></div>

    <button class="import-btn" id="import-btn" onclick="startImport()" disabled>
      Extract Recipe
    </button>
  </div>

  <!-- Loading state (shown during processing) -->
  <div class="loading-box" id="loading-box" hidden>
    <div class="spinner"></div>
    <strong>Reading your recipe…</strong>
    <p id="loading-msg">This usually takes 10–20 seconds.</p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/admin/config.js" onerror="window.ADMIN_EMAIL=null;window.NETLIFY_BUILD_HOOK=null"></script>
<script src="/admin/admin.js"></script>
<script>
const ALLOWED_MIME = new Set([
  'application/pdf',
  'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
  'application/msword',
  'image/jpeg', 'image/jpg', 'image/png', 'image/webp',
  'text/plain',
]);
const MAX_BYTES      = 10 * 1024 * 1024; // hard cap for documents
const TARGET_IMAGE   =  5 * 1024 * 1024; // compress images to this before upload
const MAX_RAW_IMAGE  = 50 * 1024 * 1024; // reject truly enormous files up front

let selectedFiles = []; // array — supports multi-page photo imports

// ── Image compression (Canvas API) ───────────────────────────────────────────
// Resizes + recompresses to TARGET_IMAGE so large iPhone photos never hit
// Claude's base64 size limit. Returns a new File (JPEG) or the original if
// it's already small enough.
function compressImage(file) {
  if (file.size <= TARGET_IMAGE) return Promise.resolve(file);
  return new Promise((resolve) => {
    const img = new Image();
    const objectUrl = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(objectUrl);
      const canvas = document.createElement('canvas');
      let w = img.naturalWidth, h = img.naturalHeight;
      // Scale down to max 2400px on the long edge
      const MAX_PX = 2400;
      if (w > MAX_PX || h > MAX_PX) {
        if (w >= h) { h = Math.round(h * MAX_PX / w); w = MAX_PX; }
        else        { w = Math.round(w * MAX_PX / h); h = MAX_PX; }
      }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      // Try progressively lower JPEG quality until under TARGET_IMAGE
      let quality = 0.82;
      const attempt = () => {
        canvas.toBlob(blob => {
          if (!blob) { resolve(file); return; }
          if (blob.size <= TARGET_IMAGE || quality <= 0.25) {
            resolve(new File([blob],
              file.name.replace(/\.[^.]+$/, '.jpg'),
              { type: 'image/jpeg', lastModified: Date.now() }
            ));
          } else {
            quality = Math.max(0.25, quality - 0.12);
            attempt();
          }
        }, 'image/jpeg', quality);
      };
      attempt();
    };
    img.onerror = () => { URL.revokeObjectURL(objectUrl); resolve(file); };
    img.src = objectUrl;
  });
}

// ── Auth ──────────────────────────────────────────────────────────────────────
(async () => { await requireAuth(); })();

// ── Drop zone wiring ──────────────────────────────────────────────────────────
const dropZone  = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');

fileInput.addEventListener('change', e => addFiles(e.target.files));

dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  addFiles(e.dataTransfer.files);
});

async function addFiles(files) {
  if (!files || !files.length) return;
  let rejected = 0;
  const toCompress = [];

  for (const file of Array.from(files)) {
    if (!ALLOWED_MIME.has(file.type)) { rejected++; continue; }
    if (file.type.startsWith('image/')) {
      if (file.size > MAX_RAW_IMAGE) {
        showBanner(`"${file.name}" is too large to use.`, 'error'); continue;
      }
      toCompress.push(file);
    } else {
      if (file.size > MAX_BYTES) {
        showBanner(`"${file.name}" is over 10 MB and was skipped.`, 'error'); continue;
      }
      if (!selectedFiles.some(f => f.name === file.name && f.size === file.size))
        selectedFiles.push(file);
    }
  }
  if (rejected) showBanner('Some files were skipped — only PDF, Word, JPEG/PNG/WebP, or plain text are supported.', 'error');

  if (toCompress.length) {
    const btn = document.getElementById('import-btn');
    btn.disabled = true;
    btn.textContent = 'Compressing…';
    const compressed = await Promise.all(toCompress.map(compressImage));
    for (const f of compressed) {
      if (!selectedFiles.some(s => s.name === f.name && s.size === f.size))
        selectedFiles.push(f);
    }
  }

  renderChips();
}

function removeFile(index) {
  selectedFiles.splice(index, 1);
  fileInput.value = '';
  renderChips();
}

function renderChips() {
  const list = document.getElementById('file-chip-list');
  list.innerHTML = '';
  selectedFiles.forEach((file, i) => {
    const chip = document.createElement('div');
    chip.className = 'file-chip';
    chip.innerHTML = `<span>${file.type.startsWith('image/') ? '🖼️' : '📎'}</span>
      <span class="file-chip__name">${escHtmlInline(file.name)}</span>
      <button class="file-chip__rm" title="Remove" onclick="removeFile(${i})">✕</button>`;
    list.appendChild(chip);
  });
  document.getElementById('import-btn').disabled = selectedFiles.length === 0;
  const btn = document.getElementById('import-btn');
  btn.textContent = selectedFiles.length > 1
    ? `Extract Recipe (${selectedFiles.length} pages)`
    : 'Extract Recipe';
}

function escHtmlInline(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Import flow ───────────────────────────────────────────────────────────────
async function startImport() {
  if (!selectedFiles.length) return;

  const { data: { session } } = await db.auth.getSession();
  if (!session) { window.location.replace('/admin/login/'); return; }

  const [{ data: categories }, { data: tags }] = await Promise.all([
    db.from('categories').select('id,slug,name').order('sort_order'),
    db.from('tags').select('id,slug,label').order('label'),
  ]);

  document.getElementById('main-ui').hidden    = true;
  document.getElementById('loading-box').hidden = false;
  if (selectedFiles.length > 1) {
    document.getElementById('loading-msg').textContent =
      `Reading ${selectedFiles.length} pages — this may take 20–40 seconds.`;
  }
  hideBanner();

  try {
    // 1. Upload all files to the imports bucket and collect signed URLs + mimeTypes
    const uploads = await Promise.all(selectedFiles.map(async (file) => {
      const ext  = (file.name.split('.').pop() || 'bin').toLowerCase();
      const path = `${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;

      const { error: uploadErr } = await db.storage
        .from('imports')
        .upload(path, file, { contentType: file.type, upsert: false });
      if (uploadErr) throw new Error(`Upload failed for "${file.name}": ${uploadErr.message}`);

      const { data: { signedUrl }, error: signErr } = await db.storage
        .from('imports')
        .createSignedUrl(path, 180);
      if (signErr) throw new Error(`Could not sign URL for "${file.name}": ${signErr.message}`);

      return { signedUrl, mimeType: file.type };
    }));

    // 2. Optionally store the first image as the pending recipe photo
    let pendingPhotoUrl = null;
    const firstImage = selectedFiles.find(f => f.type.startsWith('image/'));
    if (firstImage) {
      const ext = (firstImage.name.split('.').pop() || 'jpg').toLowerCase();
      const photoPath = `pending/${Date.now()}.${ext}`;
      const { error: photoErr } = await db.storage
        .from('recipe-photos')
        .upload(photoPath, firstImage, { contentType: firstImage.type, upsert: false });
      if (!photoErr) {
        const { data: { publicUrl } } = db.storage.from('recipe-photos').getPublicUrl(photoPath);
        pendingPhotoUrl = publicUrl;
      }
    }

    // 3. Call the Netlify function with all files
    const resp = await fetch('/.netlify/functions/import-recipe', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${session.access_token}`,
      },
      body: JSON.stringify({
        files: uploads,         // [{signedUrl, mimeType}, ...]
        categories: categories || [],
        tags:       tags       || [],
      }),
    });

    const result = await resp.json();
    if (!resp.ok) throw new Error(result.error || `Server error (${resp.status})`);

    sessionStorage.setItem('pendingImport', JSON.stringify({
      recipe:         result.recipe,
      pendingPhotoUrl,
      isImage:        !!firstImage,
    }));

    window.location.href = '/admin/recipe/?new=import';

  } catch (err) {
    document.getElementById('main-ui').hidden    = false;
    document.getElementById('loading-box').hidden = true;
    showBanner('Import failed: ' + err.message, 'error');
  }
}
</script>
</body>
</html>
