<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Edit Recipe — Julie's Recipes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,400..600,0..100;1,9..144,400..600,0..100&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <style>
    :root { --blue:#1f2ca3; --porcelain:#fffdf9; --rose:#cb8589;
            --olive:#7c7f65; --ink:#1a1a2e; --light:#e8eaf6; }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Lora',Georgia,serif; background:var(--porcelain);
           color:var(--ink); min-height:100vh; }

    /* ── Top bar ── */
    .top-bar {
      background:var(--blue); color:white; padding:0 1.5rem;
      display:flex; align-items:center; justify-content:space-between;
      height:52px; position:sticky; top:0; z-index:100;
    }
    .top-bar__left { display:flex; align-items:center; gap:.9rem; }
    .back-link { color:rgba(255,255,255,.65); font-size:.8rem;
      text-decoration:none; }
    .back-link:hover { color:white; }
    .top-bar__title { font-family:'Fraunces',serif;
      font-variation-settings:'opsz' 18,'SOFT' 80; font-size:1rem; }
    .top-bar__actions { display:flex; gap:.6rem; align-items:center; }
    .btn { font-family:'Lora',serif; font-size:.8rem; padding:.38rem .9rem;
      border-radius:6px; border:1.5px solid; cursor:pointer;
      transition:opacity .15s; }
    .btn:hover:not(:disabled) { opacity:.8; }
    .btn:disabled { opacity:.45; cursor:default; }
    .btn--primary { background:white; color:var(--blue); border-color:white; }
    .btn--ghost { background:transparent; color:white;
      border-color:rgba(255,255,255,.45); }
    .btn--danger { background:white; color:#b91c1c; border-color:#fca5a5; }

    /* ── Banner ── */
    .admin-banner { display:none; padding:.65rem 1.2rem; font-size:.83rem;
      border-radius:6px; margin:1rem 1.5rem 0; }
    .admin-banner--error { background:#fef2f2; border:1px solid #fca5a5; color:#b91c1c; }
    .admin-banner--success { background:#f0fdf4; border:1px solid #86efac; color:#166534; }

    /* ── Layout ── */
    .page { max-width:860px; margin:0 auto; padding:1.8rem 1.5rem 4rem; }
    .two-col { display:grid; grid-template-columns:1fr 320px; gap:2rem;
      align-items:start; }
    @media(max-width:700px) { .two-col { grid-template-columns:1fr; } }

    /* ── Card ── */
    .card { background:white; border-radius:10px;
      box-shadow:0 2px 10px rgba(31,44,163,.07); padding:1.4rem 1.5rem;
      margin-bottom:1.2rem; }
    .card__heading { font-family:'Fraunces',serif;
      font-variation-settings:'opsz' 18,'SOFT' 80; font-size:.95rem;
      font-weight:500; color:var(--blue); margin-bottom:1rem; }

    /* ── Fields ── */
    label { display:block; font-size:.76rem; color:var(--olive);
      letter-spacing:.05em; margin-bottom:.3rem; }
    input[type=text], textarea, select {
      width:100%; font-family:'Lora',serif; font-size:.88rem;
      padding:.45rem .75rem; border:1.5px solid #dde; border-radius:6px;
      background:var(--porcelain); color:var(--ink); outline:none;
      transition:border-color .15s; resize:vertical;
    }
    input:focus, textarea:focus, select:focus { border-color:var(--blue); }
    .field-group { margin-bottom:1rem; }

    /* ── Dynamic list editor ── */
    .list-item { display:flex; gap:.5rem; align-items:flex-start;
      margin-bottom:.45rem; }
    .list-item textarea { flex:1; rows:2; min-height:2.4rem; }
    .list-item__btns { display:flex; flex-direction:column; gap:.2rem;
      flex-shrink:0; }
    .list-btn { background:none; border:1.5px solid #dde; border-radius:4px;
      width:24px; height:24px; font-size:.75rem; cursor:pointer; color:var(--olive);
      display:flex; align-items:center; justify-content:center;
      transition:border-color .1s, color .1s; }
    .list-btn:hover { border-color:var(--blue); color:var(--blue); }
    .list-btn--rm:hover { border-color:#fca5a5; color:#b91c1c; }
    .list-btn:disabled { opacity:.3; cursor:default; }
    .add-item-btn { font-family:'Lora',serif; font-size:.8rem; color:var(--blue);
      background:none; border:1.5px dashed rgba(31,44,163,.3); border-radius:6px;
      padding:.35rem .8rem; cursor:pointer; margin-top:.3rem;
      transition:border-color .15s, background .15s; width:100%; }
    .add-item-btn:hover { border-color:var(--blue); background:var(--light); }
    .add-item-row { display:flex; gap:.4rem; }
    .add-item-row .add-item-btn { flex:1; }
    .list-item--heading {
      background:rgba(31,44,163,.05); border-radius:6px;
      padding:.15rem .4rem .15rem .3rem;
      border:1.5px dashed rgba(31,44,163,.3);
    }
    .list-item--heading textarea {
      font-family:'Fraunces',serif; font-weight:600; color:var(--blue);
      background:transparent; border-color:transparent;
    }
    .list-item--heading textarea:focus { border-color:var(--blue); }

    /* ── Tags ── */
    .tags-grid { display:flex; flex-wrap:wrap; gap:.5rem; }
    .tag-check { display:flex; align-items:center; gap:.35rem; cursor:pointer;
      font-size:.82rem; }
    .tag-check input { width:15px; height:15px; accent-color:var(--blue); }
    .new-tag-row { display:flex; gap:.5rem; margin-top:.8rem; }
    .new-tag-row input { flex:1; font-size:.82rem; }
    .new-tag-row button { white-space:nowrap; background:var(--blue); color:white;
      border:none; border-radius:6px; padding:.4rem .8rem; font-family:'Lora',serif;
      font-size:.8rem; cursor:pointer; }

    /* ── Photo ── */
    #photo-preview { max-width:100%; border-radius:8px; margin-bottom:.8rem;
      display:none; border:1.5px solid var(--light); }
    .photo-source-note { font-size:.75rem; color:var(--olive); font-style:italic;
      margin-bottom:.8rem; }
    input[type=file] { font-family:'Lora',serif; font-size:.8rem;
      border:1.5px dashed #dde; border-radius:6px; padding:.4rem .6rem;
      width:100%; cursor:pointer; background:var(--porcelain); }
    input[type=file]:hover { border-color:var(--blue); }
    #upload-status { font-size:.78rem; color:var(--olive); margin-top:.4rem;
      min-height:1.2em; }

    /* ── Delete ── */
    .delete-row { display:flex; justify-content:flex-end; margin-top:.5rem; }

    /* ── Import review ── */
    .confidence-flag-note {
      font-size:.75rem; color:#92400e; background:#fffbeb;
      border:1px solid #fcd34d; border-radius:6px;
      padding:.35rem .6rem; margin-bottom:.5rem; display:none;
    }
    .confidence-flag-note.visible { display:block; }
    .card--flagged { border:2px solid #fcd34d; }
    .use-photo-row { display:flex; align-items:center; gap:.5rem;
      font-size:.83rem; margin-bottom:.8rem; }
    .use-photo-row input { width:15px; height:15px; accent-color:var(--blue); }
    #import-photo-preview { max-width:100%; border-radius:8px; margin-bottom:.8rem;
      border:1.5px solid var(--light); display:none; }
  </style>
</head>
<body>

<div class="top-bar">
  <div class="top-bar__left">
    <a class="back-link" href="/admin/">← Dashboard</a>
    <span class="top-bar__title" id="page-title">Edit Recipe</span>
  </div>
  <div class="top-bar__actions">
    <span id="save-indicator" style="font-size:.78rem;color:rgba(255,255,255,.65);"></span>
    <button class="btn btn--primary" onclick="saveRecipe(this)">Save Recipe</button>
    <button class="btn btn--ghost" onclick="logout()">Log out</button>
  </div>
</div>

<div id="admin-banner" class="admin-banner"></div>
<div class="page">

  <div class="two-col">

    <!-- Left column: title, meta, ingredients, instructions, notes -->
    <div>
      <div class="card">
        <div class="field-group">
          <label for="recipe-title">Title</label>
          <input id="recipe-title" type="text" placeholder="Recipe title">
        </div>
        <div class="field-group">
          <label for="recipe-category">Section</label>
          <select id="recipe-category"></select>
        </div>
      </div>

      <div class="card">
        <p class="card__heading">Ingredients</p>
        <div id="ingredients-list"></div>
        <div class="add-item-row">
          <button class="add-item-btn" onclick="addItem('ingredients')">+ Add ingredient</button>
          <button class="add-item-btn" onclick="addHeading('ingredients')">+ Section</button>
        </div>
      </div>

      <div class="card">
        <p class="card__heading">Instructions</p>
        <div id="instructions-list"></div>
        <div class="add-item-row">
          <button class="add-item-btn" onclick="addItem('instructions')">+ Add step</button>
          <button class="add-item-btn" onclick="addHeading('instructions')">+ Section</button>
        </div>
      </div>

      <div class="card">
        <p class="card__heading">Notes &amp; Tips</p>
        <div id="notes-list"></div>
        <button class="add-item-btn" onclick="addItem('notes')">+ Add note</button>
      </div>
    </div>

    <!-- Right column: tags, photo, danger zone -->
    <div>
      <div class="card">
        <p class="card__heading">Tags</p>
        <div class="tags-grid" id="tags-grid"></div>
        <div class="new-tag-row">
          <input id="new-tag-input" type="text" placeholder="New tag label">
          <button onclick="createTag()">Add tag</button>
        </div>
      </div>

      <div class="card">
        <p class="card__heading">Photo</p>
        <!-- Shown when the import source was an image -->
        <div class="use-photo-row" id="use-import-photo-row" hidden>
          <input type="checkbox" id="use-import-photo" checked>
          <label for="use-import-photo" style="margin:0;font-size:.83rem;letter-spacing:0;color:var(--ink);">Use the uploaded image as this recipe's photo</label>
        </div>
        <img id="import-photo-preview" alt="Imported photo preview">
        <img id="photo-preview" alt="Recipe photo preview">
        <p id="photo-source-note" class="photo-source-note"></p>
        <label for="photo-file">Upload a photo (max 2 MB)</label>
        <input id="photo-file" type="file" accept="image/jpeg,image/png,image/webp"
               onchange="handlePhotoSelect(this)">
        <p id="upload-status"></p>
        <div id="photo-stock-toggle" hidden style="margin-top:.3rem;">
          <label style="display:flex; align-items:center; gap:.4rem; font-size:.8rem; color:var(--olive); cursor:pointer;">
            <input type="checkbox" id="photo-is-stock">
            Mark as stock / generic photo
          </label>
        </div>
      </div>

      <div class="card">
        <p class="card__heading" style="color:var(--rose)">Danger Zone</p>
        <div class="delete-row">
          <button class="btn btn--danger" onclick="deleteRecipe()">Delete this recipe</button>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/admin/config.js" onerror="window.ADMIN_EMAIL=null;window.NETLIFY_BUILD_HOOK=null"></script>
<script src="/admin/admin.js"></script>
<script>
// ── State ─────────────────────────────────────────────────────────────────────
const params   = new URLSearchParams(location.search);
let   recipeId = params.get('id');
const isImport = params.get('new') === 'import';

let allCategories = [];
let allTags       = [];
let activeTagIds  = new Set();
let listState     = { ingredients: [], instructions: [], notes: [] };

// ── Boot ──────────────────────────────────────────────────────────────────────
(async () => {
  await requireAuth();
  await Promise.all([loadCategories(), loadTags()]);

  if (isImport) {
    const raw = sessionStorage.getItem('pendingImport');
    if (!raw) { showBanner('No import data found — please start the import again.', 'error'); return; }
    loadFromImport(JSON.parse(raw));
  } else {
    if (!recipeId) { showBanner('No recipe ID in URL.', 'error'); return; }
    await loadRecipe();
  }
})();

// ── Load data ─────────────────────────────────────────────────────────────────
async function loadCategories() {
  const { data } = await db.from('categories').select('id,slug,name,sort_order').order('sort_order');
  allCategories = data || [];
  const sel = document.getElementById('recipe-category');
  sel.innerHTML = allCategories.map(c =>
    `<option value="${escHtml(c.id)}">${escHtml(c.name)}</option>`
  ).join('');
}

async function loadTags() {
  const { data } = await db.from('tags').select('id,slug,label').order('label');
  allTags = data || [];
}

async function loadRecipe() {
  const { data: recipe, error } = await db
    .from('recipes')
    .select('*, recipe_tags(tag_id)')
    .eq('id', recipeId)
    .single();

  if (error || !recipe) {
    showBanner('Recipe not found.');
    return;
  }

  // Title
  document.getElementById('page-title').textContent = recipe.title || 'Edit Recipe';
  document.getElementById('recipe-title').value = recipe.title || '';

  // Category
  const sel = document.getElementById('recipe-category');
  if (recipe.category_id) sel.value = recipe.category_id;

  // Lists
  listState.ingredients  = recipe.ingredients  || [];
  listState.instructions = recipe.instructions || [];
  listState.notes        = recipe.notes        || [];
  renderList('ingredients');
  renderList('instructions');
  renderList('notes');

  // Active tags
  activeTagIds = new Set((recipe.recipe_tags || []).map(rt => rt.tag_id));
  renderTags();

  // Photo
  if (recipe.photo_url) {
    showPhotoPreview(recipe.photo_url, 'Supabase Storage');
  } else {
    document.getElementById('photo-source-note').textContent =
      'No Supabase photo set. Local photos/ matches are used at build time. Upload here to override.';
  }
}

// ── Import pre-fill ───────────────────────────────────────────────────────────
function loadFromImport(payload) {
  const { recipe, pendingPhotoUrl, isImage } = payload;

  document.getElementById('page-title').textContent = 'Review Imported Recipe';
  document.title = 'Review Import — Julie\'s Recipes';

  // Title
  document.getElementById('recipe-title').value = recipe.title || '';

  // Category — map suggested slug → option value (category id)
  if (recipe.suggested_category) {
    const match = allCategories.find(c => c.slug === recipe.suggested_category);
    if (match) document.getElementById('recipe-category').value = match.id;
  }

  // Lists
  listState.ingredients  = recipe.ingredients  || [];
  listState.instructions = recipe.instructions || [];
  listState.notes        = recipe.notes        || [];
  renderList('ingredients');
  renderList('instructions');
  renderList('notes');

  // Tags — map suggested slugs → ids
  if (recipe.suggested_tags && recipe.suggested_tags.length) {
    const slugSet = new Set(recipe.suggested_tags);
    activeTagIds = new Set(allTags.filter(t => slugSet.has(t.slug)).map(t => t.id));
  }
  renderTags();

  // Confidence flags — highlight uncertain cards
  const flags = new Set(recipe.confidence_flags || []);
  const flagMap = {
    title:        document.querySelector('.card:has(#recipe-title)'),
    ingredients:  document.querySelector('.card:has(#ingredients-list)'),
    instructions: document.querySelector('.card:has(#instructions-list)'),
    notes:        document.querySelector('.card:has(#notes-list)'),
  };
  flags.forEach(key => {
    const card = flagMap[key];
    if (!card) return;
    card.classList.add('card--flagged');
    const note = document.createElement('p');
    note.className = 'confidence-flag-note visible';
    note.textContent = 'Claude wasn\'t certain about this — please double-check.';
    card.insertBefore(note, card.firstChild);
  });

  // Photo — if source was an image offer to use it
  if (isImage && pendingPhotoUrl) {
    const row     = document.getElementById('use-import-photo-row');
    const preview = document.getElementById('import-photo-preview');
    row.hidden    = false;
    preview.src   = pendingPhotoUrl;
    preview.style.display = 'block';
    document.getElementById('photo-stock-toggle').hidden = false;
    document.getElementById('photo-is-stock').checked = false;
  }

  showBanner('Recipe extracted! Review everything below, then click Save Recipe.', 'success');
}

// ── Dynamic list editors ──────────────────────────────────────────────────────
function renderList(key) {
  const container = document.getElementById(key + '-list');
  container.innerHTML = '';
  const items = listState[key];
  items.forEach((text, i) => {
    const isHeading = text.startsWith('## ');
    const displayText = isHeading ? text.slice(3) : text;

    const row = document.createElement('div');
    row.className = 'list-item' + (isHeading ? ' list-item--heading' : '');

    const ta = document.createElement('textarea');
    ta.rows = displayText.length > 80 ? 3 : 2;
    ta.value = displayText;
    ta.placeholder = isHeading ? 'Section name…' : '';
    ta.oninput = () => { listState[key][i] = isHeading ? '## ' + ta.value : ta.value; };

    const btns = document.createElement('div');
    btns.className = 'list-item__btns';

    const up = makeListBtn('↑', i === 0, () => { swapItems(key, i, i-1); });
    const dn = makeListBtn('↓', i === items.length-1, () => { swapItems(key, i, i+1); });
    const rm = makeListBtn('×', false, () => { listState[key].splice(i, 1); renderList(key); });
    rm.classList.add('list-btn--rm');

    btns.append(up, dn, rm);
    row.append(ta, btns);
    container.appendChild(row);
  });
}

function makeListBtn(label, disabled, onClick) {
  const b = document.createElement('button');
  b.className = 'list-btn';
  b.textContent = label;
  b.disabled = disabled;
  b.onclick = onClick;
  return b;
}

function swapItems(key, i, j) {
  [listState[key][i], listState[key][j]] = [listState[key][j], listState[key][i]];
  renderList(key);
}

function addItem(key) {
  listState[key].push('');
  renderList(key);
  const tas = document.querySelectorAll('#' + key + '-list .list-item textarea');
  tas[tas.length - 1]?.focus();
}

function addHeading(key) {
  listState[key].push('## ');
  renderList(key);
  const tas = document.querySelectorAll('#' + key + '-list .list-item textarea');
  const last = tas[tas.length - 1];
  if (last) { last.focus(); last.setSelectionRange(0, 0); }
}

function syncListFromDOM(key) {
  document.querySelectorAll('#' + key + '-list .list-item textarea').forEach((ta, i) => {
    const wasHeading = (listState[key][i] || '').startsWith('## ');
    listState[key][i] = wasHeading ? '## ' + ta.value : ta.value;
  });
  listState[key] = listState[key].map(s => s.trim()).filter(s => s && s !== '##');
}

// ── Tags ──────────────────────────────────────────────────────────────────────
function renderTags() {
  const grid = document.getElementById('tags-grid');
  grid.innerHTML = '';
  allTags.forEach(tag => {
    const lbl = document.createElement('label');
    lbl.className = 'tag-check';
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.value = tag.id;
    cb.checked = activeTagIds.has(tag.id);
    lbl.append(cb, document.createTextNode(tag.label));
    grid.appendChild(lbl);
  });
}

async function createTag() {
  const input = document.getElementById('new-tag-input');
  const label = input.value.trim();
  if (!label) return;
  const slug = label.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/-+/g, '-').trim();
  const { data, error } = await db.from('tags').insert({ slug, label }).select('id,slug,label').single();
  if (error) { showBanner('Could not create tag: ' + error.message); return; }
  allTags.push(data);
  allTags.sort((a, b) => a.label.localeCompare(b.label));
  input.value = '';
  renderTags();
  showBanner('Tag "' + label + '" created.', 'success');
}

// ── Photo upload ──────────────────────────────────────────────────────────────
function handlePhotoSelect(input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 2 * 1024 * 1024) {
    showBanner('Photo is over 2 MB. Please resize it first.', 'error');
    input.value = '';
    return;
  }
  // Show local preview immediately
  const preview = document.getElementById('photo-preview');
  preview.src = URL.createObjectURL(file);
  preview.style.display = 'block';
  document.getElementById('upload-status').textContent = 'Ready to upload — click Save Recipe.';
  // Store file reference for upload-on-save
  window._pendingPhotoFile = file;
  document.getElementById('photo-stock-toggle').hidden = false;
  document.getElementById('photo-is-stock').checked = false;
}

async function uploadPendingPhoto() {
  const file = window._pendingPhotoFile;
  if (!file) return null;

  const ext  = file.name.split('.').pop().toLowerCase() || 'jpg';
  const path = `${recipeId}/${Date.now()}.${ext}`;
  const statusEl = document.getElementById('upload-status');

  statusEl.textContent = 'Uploading photo…';
  statusEl.style.color = '';

  const { error } = await db.storage.from('recipe-photos').upload(path, file, {
    upsert: true,
    contentType: file.type,
  });
  if (error) {
    console.error('Storage upload error:', error);
    statusEl.textContent = 'Upload failed: ' + error.message;
    statusEl.style.color = '#b91c1c';
    showBanner('Photo upload failed: ' + error.message);
    return null;
  }

  const { data: { publicUrl } } = db.storage.from('recipe-photos').getPublicUrl(path);
  statusEl.textContent = 'Photo uploaded ✓';
  window._pendingPhotoFile = null;
  return publicUrl;
}

function showPhotoPreview(url, source) {
  const preview = document.getElementById('photo-preview');
  preview.src = url;
  preview.style.display = 'block';
  document.getElementById('photo-source-note').textContent = `Photo source: ${source}`;
}

// ── Save ──────────────────────────────────────────────────────────────────────
async function saveRecipe(btn) {
  btn.disabled = true;
  btn.textContent = 'Saving…';
  hideBanner();

  // Sync list textareas → listState
  syncListFromDOM('ingredients');
  syncListFromDOM('instructions');
  syncListFromDOM('notes');

  // Upload photo if queued
  const uploadedUrl = await uploadPendingPhoto();

  // Build recipe row
  const title = document.getElementById('recipe-title').value.trim();
  const row = {
    title,
    category_id:  document.getElementById('recipe-category').value,
    ingredients:  listState.ingredients,
    instructions: listState.instructions,
    notes:        listState.notes,
  };
  if (isImport && !recipeId) {
    row.slug = title.toLowerCase()
      .replace(/[^a-z0-9\s-]/g, '').replace(/\s+/g, '-').replace(/-+/g, '-').trim();
  }
  if (uploadedUrl) {
    row.photo_url = uploadedUrl;
    row.photo_is_stock = document.getElementById('photo-is-stock').checked;
  }

  if (!row.title) {
    showBanner('Title cannot be empty.', 'error');
    btn.disabled = false; btn.textContent = 'Save Recipe';
    return;
  }

  const selectedIds = Array.from(
    document.querySelectorAll('#tags-grid input[type=checkbox]:checked')
  ).map(cb => cb.value);

  if (isImport && !recipeId) {
    // ── INSERT new recipe (import review save) ────────────────────────────
    // Apply import photo if the checkbox is checked
    const usePhotoBox = document.getElementById('use-import-photo');
    const importPhotoSrc = document.getElementById('import-photo-preview').src;
    if (usePhotoBox && usePhotoBox.closest('#use-import-photo-row') &&
        !document.getElementById('use-import-photo-row').hidden &&
        usePhotoBox.checked && importPhotoSrc) {
      row.photo_url = importPhotoSrc;
      row.photo_is_stock = document.getElementById('photo-is-stock').checked;
    }

    const { data: created, error: insertErr } = await db
      .from('recipes').insert(row).select('id').single();
    if (insertErr) {
      showBanner('Save failed: ' + insertErr.message);
      btn.disabled = false; btn.textContent = 'Save Recipe';
      return;
    }

    recipeId = created.id;
    if (selectedIds.length) {
      await db.from('recipe_tags').insert(
        selectedIds.map(tagId => ({ recipe_id: recipeId, tag_id: tagId }))
      );
    }

    sessionStorage.removeItem('pendingImport');
    // Switch URL to edit mode without a page reload
    window.history.replaceState({}, '', `/admin/recipe/?id=${recipeId}`);
    // Auto-publish so the new recipe appears on the site without a manual rebuild
    triggerRebuild(null, 'Recipe saved. Will show up in ~1 minute!');

  } else {
    // ── UPDATE existing recipe ─────────────────────────────────────────────
    const { error: recipeErr } = await db.from('recipes').update(row).eq('id', recipeId);
    if (recipeErr) {
      showBanner('Save failed: ' + recipeErr.message);
      btn.disabled = false; btn.textContent = 'Save Recipe';
      return;
    }

    await db.from('recipe_tags').delete().eq('recipe_id', recipeId);
    if (selectedIds.length) {
      await db.from('recipe_tags').insert(
        selectedIds.map(tagId => ({ recipe_id: recipeId, tag_id: tagId }))
      );
    }
  }

  // ── Post-save UI ───────────────────────────────────────────────────────
  document.getElementById('page-title').textContent = row.title;
  document.title = `Edit "${row.title}" — Julie's Recipes`;

  // Hide import-only chrome after first save
  const importRow = document.getElementById('use-import-photo-row');
  if (importRow) importRow.hidden = true;
  document.querySelectorAll('.card--flagged').forEach(c => c.classList.remove('card--flagged'));
  document.querySelectorAll('.confidence-flag-note').forEach(n => n.remove());

  renderList('ingredients');
  renderList('instructions');
  renderList('notes');

  showBanner('Recipe saved!', 'success');
  const ind = document.getElementById('save-indicator');
  ind.textContent = 'Saved ' + new Date().toLocaleTimeString();
  btn.disabled = false; btn.textContent = 'Save Recipe';
}

// ── Delete ────────────────────────────────────────────────────────────────────
async function deleteRecipe() {
  const title = document.getElementById('recipe-title').value || 'this recipe';
  if (!confirm(`Permanently delete "${title}"? This cannot be undone.`)) return;
  const { error } = await db.from('recipes').delete().eq('id', recipeId);
  if (error) { showBanner('Delete failed: ' + error.message); return; }
  await triggerRebuild(null, 'Recipe deleted. Site will update in ~1 minute!');
  window.location.replace('/admin/');
}
</script>

</html>
