<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <!--
    Willow tablecloth tile — PLACEHOLDER
    Replace this file with willow-pattern.png (or keep as SVG) when real artwork is ready.
    The CSS references this as background-image and tiles it across the page.
    Design intent: blue-and-white chinoiserie lattice, soft and seamlessly tileable.
  -->

  <!-- Porcelain ground (ensures seamless tiling) -->
  <rect width="240" height="240" fill="#fffdf9"/>

  <!-- Lattice: two horizontal and two vertical gentle wave stems -->
  <!-- Horizontal at y=60 and y=180 -->
  <path d="M0,60 C40,54 80,66 120,60 C160,54 200,66 240,60"
        stroke="#1f2ca3" stroke-width="0.85" fill="none" opacity="0.55"/>
  <path d="M0,180 C40,174 80,186 120,180 C160,174 200,186 240,180"
        stroke="#1f2ca3" stroke-width="0.85" fill="none" opacity="0.55"/>
  <!-- Vertical at x=60 and x=180 -->
  <path d="M60,0 C54,40 66,80 60,120 C54,160 66,200 60,240"
        stroke="#1f2ca3" stroke-width="0.85" fill="none" opacity="0.55"/>
  <path d="M180,0 C174,40 186,80 180,120 C174,160 186,200 180,240"
        stroke="#1f2ca3" stroke-width="0.85" fill="none" opacity="0.55"/>

  <!-- Almond leaf pairs along horizontal stems (at x=30, 90, 150, 210) -->
  <path d="M30,60 C28,53 34,51 34,57" fill="#1f2ca3" opacity="0.42"/>
  <path d="M30,60 C28,67 34,69 34,63" fill="#1f2ca3" opacity="0.42"/>
  <path d="M90,60 C92,53 86,51 86,57" fill="#1f2ca3" opacity="0.42"/>
  <path d="M90,60 C92,67 86,69 86,63" fill="#1f2ca3" opacity="0.42"/>
  <path d="M150,180 C148,173 154,171 154,177" fill="#1f2ca3" opacity="0.42"/>
  <path d="M150,180 C148,187 154,189 154,183" fill="#1f2ca3" opacity="0.42"/>
  <path d="M210,180 C212,173 206,171 206,177" fill="#1f2ca3" opacity="0.42"/>
  <path d="M210,180 C212,187 206,189 206,183" fill="#1f2ca3" opacity="0.42"/>

  <!-- Almond leaf pairs along vertical stems (at y=30, 90, 150, 210) -->
  <path d="M60,30 C53,28 51,34 57,34" fill="#1f2ca3" opacity="0.42"/>
  <path d="M60,30 C67,28 69,34 63,34" fill="#1f2ca3" opacity="0.42"/>
  <path d="M60,90 C53,92 51,86 57,86" fill="#1f2ca3" opacity="0.42"/>
  <path d="M60,90 C67,92 69,86 63,86" fill="#1f2ca3" opacity="0.42"/>
  <path d="M180,150 C173,148 171,154 177,154" fill="#1f2ca3" opacity="0.42"/>
  <path d="M180,150 C187,148 189,154 183,154" fill="#1f2ca3" opacity="0.42"/>
  <path d="M180,210 C173,212 171,206 177,206" fill="#1f2ca3" opacity="0.42"/>
  <path d="M180,210 C187,212 189,206 183,206" fill="#1f2ca3" opacity="0.42"/>

  <!-- 4-petal flowers at each lattice crossing (60,60) (180,60) (60,180) (180,180) -->
  <g opacity="0.58">
    <!-- (60, 60) -->
    <circle cx="60" cy="60" r="3.2" fill="#1f2ca3"/>
    <path d="M60,51 C58,46 62,44 62,50" fill="#1f2ca3" opacity="0.65"/>
    <path d="M69,60 C74,58 76,62 70,62" fill="#1f2ca3" opacity="0.65"/>
    <path d="M60,69 C58,74 62,76 62,70" fill="#1f2ca3" opacity="0.65"/>
    <path d="M51,60 C46,58 44,62 50,62" fill="#1f2ca3" opacity="0.65"/>
    <!-- (180, 60) -->
    <circle cx="180" cy="60" r="3.2" fill="#1f2ca3"/>
    <path d="M180,51 C178,46 182,44 182,50" fill="#1f2ca3" opacity="0.65"/>
    <path d="M189,60 C194,58 196,62 190,62" fill="#1f2ca3" opacity="0.65"/>
    <path d="M180,69 C178,74 182,76 182,70" fill="#1f2ca3" opacity="0.65"/>
    <path d="M171,60 C166,58 164,62 170,62" fill="#1f2ca3" opacity="0.65"/>
    <!-- (60, 180) -->
    <circle cx="60" cy="180" r="3.2" fill="#1f2ca3"/>
    <path d="M60,171 C58,166 62,164 62,170" fill="#1f2ca3" opacity="0.65"/>
    <path d="M69,180 C74,178 76,182 70,182" fill="#1f2ca3" opacity="0.65"/>
    <path d="M60,189 C58,194 62,196 62,190" fill="#1f2ca3" opacity="0.65"/>
    <path d="M51,180 C46,178 44,182 50,182" fill="#1f2ca3" opacity="0.65"/>
    <!-- (180, 180) -->
    <circle cx="180" cy="180" r="3.2" fill="#1f2ca3"/>
    <path d="M180,171 C178,166 182,164 182,170" fill="#1f2ca3" opacity="0.65"/>
    <path d="M189,180 C194,178 196,182 190,182" fill="#1f2ca3" opacity="0.65"/>
    <path d="M180,189 C178,194 182,196 182,190" fill="#1f2ca3" opacity="0.65"/>
    <path d="M171,180 C166,178 164,182 170,182" fill="#1f2ca3" opacity="0.65"/>
  </g>

  <!-- Centre ornament at (120,120) — 5-petal rose -->
  <g opacity="0.52" transform="translate(120,120)">
    <circle r="4.5" fill="#1f2ca3"/>
    <circle r="1.8" fill="#fffdf9" opacity="0.85"/>
    <path d="M0,-10 C-2,-6 -1,-2 0,-4 C1,-2 2,-6 0,-10" fill="#1f2ca3"/>
    <path d="M9.5,-3 C5.5,-2 3,0 5,1 C7,2 9.5,1 9.5,-3" fill="#1f2ca3"/>
    <path d="M5.8,8 C3,5 1,4 1,6 C1,8 3.5,9.5 5.8,8" fill="#1f2ca3"/>
    <path d="M-5.8,8 C-3,5 -1,4 -1,6 C-1,8 -3.5,9.5 -5.8,8" fill="#1f2ca3"/>
    <path d="M-9.5,-3 C-5.5,-2 -3,0 -5,1 C-7,2 -9.5,1 -9.5,-3" fill="#1f2ca3"/>
  </g>
</svg>
