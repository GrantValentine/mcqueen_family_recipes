[build]
  command = "pip install -r requirements.txt && python main.py --no-extract"
  publish = "site"

[build.environment]
  PYTHON_VERSION = "3.12"
  # Set these in the Netlify dashboard → Site settings → Environment variables:
  #   SUPABASE_URL          — project URL (public)
  #   SUPABASE_ANON_KEY     — anon/public key (public)
  #   ADMIN_EMAIL           — admin user email (maps "jolene" login → real email)
  #   NETLIFY_BUILD_HOOK    — build hook URL for "Publish Changes" button
  #   ANTHROPIC_API_KEY     — server-side only; used by the import-recipe function

[functions]
  node_bundler = "esbuild"

[functions."import-recipe"]
  timeout = 26

[functions."supabase-ping"]
  schedule = "0 10 * * *"

